<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subham by Hero</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Arial', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container { 
            text-align: center; 
            max-width: 600px; 
            padding: 40px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        h1 { 
            font-size: 3.5em; 
            margin-bottom: 20px; 
            background: linear-gradient(45deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle { 
            font-size: 1.5em; 
            margin-bottom: 30px; 
            opacity: 0.9;
        }
        .hero-text { 
            font-size: 1.2em; 
            line-height: 1.6; 
            margin-bottom: 40px;
            opacity: 0.95;
        }
        .cta-button {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(45deg, #FF6B6B, #FF8E8E);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
        }
        .cta-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255,107,107,0.6);
        }
        @media (max-width: 768px) {
            h1 { font-size: 2.5em; }
            .subtitle { font-size: 1.2em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Subham by Hero</h1>
        <p class="subtitle">🚀 Your Vision, My Power</p>
        <p class="hero-text">
            Welcome to the world of Subham by Hero! Yahan har sapna haqeeqat banega. 
            Hum aapke saath hain har kadam par - innovation, creativity aur success ki guarantee ke saath.
        </p>
        <a href="#contact" class="cta-button">Get Started Abhi!</a>
    </div>
</body>
</html>
